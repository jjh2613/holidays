name: GitHub Pages 배포
on:
  push:
    branches: [main]
    paths:
      - "public/**"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
# 동시 배포 방지 — 진행 중 배포는 취소하지 않고 큐에 쌓아 순서 보장.
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: public/ 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
