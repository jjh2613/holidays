name: 공휴일 자동 갱신
on:
  schedule:
    - cron: "0 0 * * *" # UTC 0시 = KST 09시
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 특일정보 조회 (3개월 롤링)
        run: node scripts/fetch.mjs
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
      - name: public 생성
        run: node scripts/build.mjs
      - name: 검증
        run: node scripts/validate.mjs
      - name: auto 변경 감지
        id: auto_changed
        run: |
          if [ -n "$(git status --porcelain -- auto/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "auto/ 변경 없음 — PR을 생성하지 않습니다."
          fi
      - name: PR 생성
        if: steps.auto_changed.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/holidays-update
          title: "chore: 공휴일 데이터 자동 갱신"
          commit-message: "chore: 공휴일 데이터 자동 갱신"
          body: |
            공공데이터포털 특일정보 API 자동 조회 결과입니다(이번 달~다다음 달).
            `auto/`(원본)와 병합 결과인 `public/` 변경을 확인 후 머지하세요.
          delete-branch: true
